services:
  postgres:
    image: postgres:16
    container_name: devmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devmind
      POSTGRES_PASSWORD: devmind_password
      POSTGRES_DB: devmind_db
    ports:
      - "5432:5432"
    volumes:
      - devmind_postgres_data:/var/lib/postgresql/data

volumes:
  devmind_postgres_data: