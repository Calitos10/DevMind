openapi: 3.0.3

info:
  title: DevMind API
  description: API backend para indexar proyectos software y consultarlos en lenguaje natural.
  version: 1.3.0

servers:
  - url: http://localhost:3000
    description: Servidor local de desarrollo

tags:
  - name: Health
    description: Estado del servidor
  - name: Auth
    description: Registro, login y usuario autenticado
  - name: Projects
    description: Gestión de proyectos del usuario
  - name: Project Files
    description: Gestión de archivos dentro de un proyecto
  - name: Upload ZIP
    description: Subida masiva de archivos desde un ZIP comprimido
  - name: Indexing
    description: Generación de embeddings de un proyecto y consulta de su progreso
  - name: Project Questions
    description: Preguntas en lenguaje natural sobre el código de un proyecto (RAG)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          description: >
            Árbol de errores de validación de Zod (solo presente en errores
            400 de validación de body, mensaje "Validation error").
      required:
        - message

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
      required:
        - id
        - name
        - email

    Project:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - ownerId
        - name
        - createdAt

    UploadZipResult:
      type: object
      properties:
        projectId:
          type: string
        summary:
          type: object
          properties:
            created:
              type: integer
            updated:
              type: integer
            deleted:
              type: integer
            unchanged:
              type: integer
          required:
            - created
            - updated
            - deleted
            - unchanged
        files:
          type: object
          properties:
            created:
              type: array
              items:
                $ref: "#/components/schemas/ProjectFile"
            updated:
              type: array
              items:
                $ref: "#/components/schemas/ProjectFile"
            deleted:
              type: array
              items:
                $ref: "#/components/schemas/ProjectFile"
            unchanged:
              type: array
              items:
                $ref: "#/components/schemas/ProjectFile"
          required:
            - created
            - updated
            - deleted
            - unchanged
      required:
        - projectId
        - summary
        - files

    ProjectFile:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        path:
          type: string
        language:
          type: string
        content:
          type: string
        size:
          type: integer
        hash:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - path
        - language
        - content
        - size
        - hash
        - createdAt

    ProjectIndexingResult:
      type: object
      properties:
        projectId:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
          example: completed
        totalChunks:
          type: integer
          example: 1
        processedChunks:
          type: integer
          example: 1
        failedChunks:
          type: integer
          example: 0
      required:
        - projectId
        - status
        - totalChunks
        - processedChunks
        - failedChunks

    ProjectIndexingStatus:
      allOf:
        - $ref: "#/components/schemas/ProjectIndexingResult"
        - type: object
          properties:
            progress:
              type: integer
              minimum: 0
              maximum: 100
              example: 100
              description: Porcentaje de chunks procesados sobre el total (0 si aún no hay job de indexación).
          required:
            - progress

    AskProjectQuestionResult:
      type: object
      properties:
        answer:
          type: string
          example: El registro de usuario se realiza en RegisterUserUseCase.
        sources:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                example: src/auth/registerUserUseCase.ts
              startLine:
                type: integer
                example: 10
              endLine:
                type: integer
                example: 45
            required:
              - path
              - startLine
              - endLine
      required:
        - answer
        - sources

paths:
  /health:
    get:
      tags:
        - Health
      summary: Comprueba que la API está en funcionamiento
      responses:
        "200":
          description: API en funcionamiento
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: DevMind API
                  message:
                    type: string
                    example: API is running

  /auth/register:
    post:
      tags:
        - Auth
      summary: Registrar un nuevo usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  example: Carlos
                email:
                  type: string
                  format: email
                  example: carlos@example.com
                password:
                  type: string
                  minLength: 6
                  example: password123
              required:
                - name
                - email
                - password
      responses:
        "201":
          description: Usuario registrado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Body inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: El email ya está registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Demasiadas peticiones (límite de rate limit de autenticación por IP superado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: carlos@example.com
                password:
                  type: string
                  minLength: 6
                  example: password123
              required:
                - email
                - password
      responses:
        "200":
          description: Login correcto
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Body inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Demasiadas peticiones (límite de rate limit de autenticación por IP superado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/me:
    get:
      tags:
        - Auth
      summary: Obtener el usuario autenticado
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Datos del usuario autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects:
    post:
      tags:
        - Projects
      summary: Crear un proyecto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  example: DevMind API
                description:
                  type: string
                  example: Backend con IA para consultar proyectos software
              required:
                - name
      responses:
        "201":
          description: Proyecto creado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Body inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      tags:
        - Projects
      summary: Listar proyectos del usuario autenticado
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de proyectos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{id}:
    get:
      tags:
        - Projects
      summary: Obtener un proyecto por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
      responses:
        "200":
          description: Proyecto encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto no encontrado o no pertenece al usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Projects
      summary: Borrar un proyecto
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
      responses:
        "204":
          description: Proyecto borrado correctamente
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto no encontrado o no pertenece al usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{id}/upload:
    post:
      tags:
        - Upload ZIP
      summary: Subir un ZIP y sincronizar los archivos del proyecto
      description: >
        Recibe un archivo ZIP via multipart/form-data, extrae su contenido
        e ignora carpetas como node_modules, .git, dist, build, coverage y .next.
        Compara cada archivo del ZIP con los archivos existentes del proyecto
        por ruta y hash: crea los archivos nuevos, actualiza los que cambiaron,
        deja intactos los que no cambiaron (unchanged) y borra los archivos
        existentes cuya ruta ya no está presente en el ZIP.
        Los archivos creados o actualizados se trocean en fragmentos de código
        (code chunks) de forma síncrona. La generación de embeddings (indexación)
        NO se dispara automáticamente: tras la subida, el usuario debe lanzarla
        de forma explícita con `POST /projects/{id}/index`, y puede consultar su
        progreso con `GET /projects/{id}/indexing-status`.
        Devuelve 400 si no se adjunta archivo o si el ZIP no contiene archivos válidos.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo ZIP del proyecto
              required:
                - file
      responses:
        "201":
          description: ZIP procesado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadZipResult"
        "400":
          description: Archivo ZIP no adjuntado o sin archivos válidos tras filtrar carpetas ignoradas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto no encontrado o no pertenece al usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Demasiadas peticiones (límite de rate limit de subida por usuario autenticado superado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{id}/index:
    post:
      tags:
        - Indexing
      summary: Generar (o regenerar) los embeddings de un proyecto
      description: >
        Recorre todos los code chunks existentes del proyecto y genera su
        embedding vectorial de forma síncrona, guardando el progreso en un
        job de indexación (`project_indexing_jobs`). La llamada no devuelve
        la respuesta hasta que termina de procesar todos los chunks (o falla).
        La indexación es una acción explícita del usuario: no se dispara sola
        tras subir el ZIP, sino que se invoca con este endpoint. Al ser síncrono,
        si el proveedor de embeddings falla, el error se devuelve en la respuesta.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
      responses:
        "200":
          description: Indexación completada (o fallida) con su resumen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIndexingResult"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto no encontrado o no pertenece al usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Ya hay una indexación en curso para este proyecto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Demasiadas peticiones (límite de rate limit de indexación por usuario autenticado superado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{id}/indexing-status:
    get:
      tags:
        - Indexing
      summary: Consultar el progreso de indexación (embeddings) de un proyecto
      description: >
        Devuelve el estado del último job de indexación del proyecto:
        `pending` (todavía no se ha indexado nunca), `processing`,
        `completed` o `failed`, junto con el número de chunks totales,
        procesados, fallidos y el progreso en porcentaje.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
      responses:
        "200":
          description: Estado de indexación del proyecto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIndexingStatus"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto no encontrado o no pertenece al usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{id}/ask:
    post:
      tags:
        - Project Questions
      summary: Preguntar en lenguaje natural sobre el código de un proyecto
      description: >
        Recibe una pregunta en lenguaje natural sobre un proyecto propio.
        Genera el embedding de la pregunta, busca en PostgreSQL/pgvector los
        code chunks más parecidos dentro de ese proyecto (findSimilarByProjectId)
        y usa esos fragmentos como contexto para generar una respuesta.
        Si el proyecto todavía no tiene embeddings generados (por ejemplo, el
        usuario aún no ha lanzado la indexación con POST /projects/{id}/index, o
        esta no ha terminado) no habrá chunks relevantes que encontrar; en ese
        caso se devuelve una
        respuesta de fallback y una lista de fuentes vacía en lugar de llamar
        al generador de respuestas. Esa misma respuesta de fallback se devuelve
        cuando los chunks encontrados no superan el umbral de similitud
        configurado (RAG_MAX_DISTANCE): así se evita responder con contexto que
        en realidad no es relevante para la pregunta. Se recomienda comprobar
        `GET /projects/{id}/indexing-status` antes de preguntar.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  minLength: 1
                  example: ¿Dónde se registra un usuario?
              required:
                - question
      responses:
        "200":
          description: Respuesta generada a partir del código del proyecto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskProjectQuestionResult"
        "400":
          description: Body inválido (pregunta vacía o ausente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto no encontrado o no pertenece al usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Demasiadas peticiones (límite de rate limit de preguntas por usuario autenticado superado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{projectId}/files:
    get:
      tags:
        - Project Files
      summary: Listar archivos de un proyecto
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
      responses:
        "200":
          description: Lista de archivos del proyecto
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectFile"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto no encontrado o no pertenece al usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{projectId}/files/{fileId}:
    get:
      tags:
        - Project Files
      summary: Obtener un archivo por ID
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          example: file-uuid
      responses:
        "200":
          description: Archivo encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto o archivo no encontrado, o no pertenece al usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Project Files
      summary: Borrar un archivo de un proyecto
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
          example: project-uuid
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          example: file-uuid
      responses:
        "204":
          description: Archivo borrado correctamente
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Proyecto o archivo no encontrado, o no pertenece al usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
